<html>
<head>
    <title>Thay đổi thuộc tính trang Web</title>
    <meta charset="utf-8">

    <script>
    function CapNhat() {
        // Thay đổi tiêu đề
        document.title = TieuDe.value;

        // Thay đổi màu nền
        document.bgColor = MauNen.value;

        // Thay đổi màu chữ
        document.fgColor = MauChu.value;

        // Thay đổi thanh trạng thái
        window.defaultStatus = TrangThai.value;
    }
    </script>
</head>

<body>
<h2>Nhập giá trị và nhấn nút Thay đổi</h2>

<input type="text" name="TieuDe" value="Tiêu đề mới"><br><br>

<input type="text" name="MauNen" value="blue"><br><br>

<input type="text" name="MauChu" value="white"><br><br>

<input type="text" name="TrangThai" value="Xin chào!"><br><br>

<input type="button" name="ThayDoi" value="Thay đổi" onclick="CapNhat()">

</body>
</html>
